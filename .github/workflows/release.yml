name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            artifact_name: wart
          - os: ubuntu-latest
            target: aarch64-linux
            artifact_name: wart
          - os: macos-latest
            target: x86_64-macos
            artifact_name: wart
          - os: macos-latest
            target: aarch64-macos
            artifact_name: wart
          - os: windows-latest
            target: x86_64-windows
            artifact_name: wart.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: ${{ secrets.ZIG_VERSION || 'master' }}

      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Drelease=true -Duse-llvm=true

      - name: Archive Release
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'wart-${{ matrix.target }}.zip'
          directory: 'zig-out/bin'

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: zig-out/bin/wart-${{ matrix.target }}.zip
          generate_release_notes: true

  homebrew:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Extract version
        id: extract_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          formula: wart
          tag: ${{ github.ref_name }}
          revision: ${{ github.sha }}
          force: false
